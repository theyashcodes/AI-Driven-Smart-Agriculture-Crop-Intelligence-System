version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: agri_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-agri_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agri-network

  mongodb:
    image: mongo:6
    container_name: agri_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agri-network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: agri_mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001" # WebSockets
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - agri-network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: agri_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-agri_db}
      - MONGO_URL=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-admin123}@mongodb:27017/
      - MQTT_BROKER_URL=mosquitto
      - MQTT_PORT=1883
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
    depends_on:
      - postgres
      - mongodb
      - mosquitto
    networks:
      - agri-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agri_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - agri-network

volumes:
  postgres_data:
  mongodb_data:
  mosquitto_data:
  mosquitto_log:

networks:
  agri-network:
    driver: bridge
